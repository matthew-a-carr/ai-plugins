name: CI

on:
  push:
    branches: [main]
  pull_request:
jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true

      - name: Run tests
        run: go test ./tools/...

      - name: Validate plugin.json manifests
        run: go run ./cmd/validate-plugins

      - name: Check naming conventions
        run: go run ./cmd/check-naming

      - name: Validate skills (agent-skills)
        working-directory: plugins/agent-skills
        run: |
          set +e
          go tool skill-validator check --emit-annotations skills/
          rc=$?
          go tool skill-validator check -o markdown skills/ >> "$GITHUB_STEP_SUMMARY"
          if [ "$rc" -gt 1 ] && [ "$rc" -le 2 ]; then exit 0; fi
          exit "$rc"

      - name: Lint markdown
        run: go run ./cmd/check-markdown
