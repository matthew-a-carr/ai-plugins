# lefthook.yml — Git hooks for the ai-plugins monorepo.
# Install once: lefthook install
# Run on demand: lefthook run pre-commit

pre-commit:
  parallel: true
  commands:
    validate-plugins:
      glob: "plugins/*/.claude-plugin/plugin.json"
      run: go run ./cmd/validate-plugins

    check-naming:
      glob: "**/*.md"
      run: go run ./cmd/check-naming

    check-markdown:
      glob: "**/*.md"
      run: go run ./cmd/check-markdown

    skill-validator:
      glob: "plugins/agent-skills/skills/**"
      root: "plugins/agent-skills/"
      run: >-
        go tool skill-validator check skills/;
        rc=$?;
        if [ "$rc" -gt 1 ] && [ "$rc" -le 2 ]; then exit 0; fi;
        exit "$rc"

commit-msg:
  commands:
    conventional-commits:
      run: >-
        head -1 {1} | grep -qE '^(feat|fix|refactor|build|ci|chore|docs|style|perf|test)(\(.+\))?(!)?\: .+' ||
        { echo "Commit message must follow Conventional Commits: type(scope): description"; exit 1; }
