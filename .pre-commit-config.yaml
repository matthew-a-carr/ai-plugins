# Pre-commit hooks for the ai-plugins monorepo.
# Install once: uvx pre-commit install --hook-type pre-commit --hook-type commit-msg
# Run on demand: uvx pre-commit run --all-files
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-json
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-added-large-files
        args: ["--maxkb=200"]

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.18.1
    hooks:
      - id: markdownlint-cli2

  # Link checking via lychee in Docker — runs the same locally and in CI.
  # First run pulls the image (~30s); subsequent runs are fast.
  - repo: local
    hooks:
      - id: lychee
        name: lychee link check
        entry: lycheeverse/lychee:0.24.2-alpine
        language: docker_image
        args:
          - "--no-progress"
          - "--cache"
          - "--max-cache-age"
          - "7d"
          - "--max-retries"
          - "5"
          - "--retry-wait-time"
          - "3"
          - "--exclude"
          - "https://github\\.com/matthew-a-carr/ai-plugins/(compare|commit|tree|blob)/"
        files: \.md$

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]

  - repo: local
    hooks:
      - id: uv-lock
        name: uv lock check
        entry: uv lock --check
        language: system
        pass_filenames: false
        files: pyproject\.toml|uv\.lock
      - id: ruff
        name: ruff lint
        entry: uv run ruff check --force-exclude
        language: system
        types: [python]
      - id: naming-convention
        name: naming convention (lowercase dirs, kebab-case files)
        entry: uv run plugins/engineering-principles/scripts/check_naming.py
        language: system
        pass_filenames: false
        always_run: true
      - id: skill-validator
        name: Skill spec compliance
        entry: uv run plugins/agent-skills/scripts/validate_skills.py
        language: system
        files: ^plugins/agent-skills/skills/
        pass_filenames: false
