# Markdownlint config. Only rules that catch genuine mistakes are enabled.
# Skill files are dense, AI-consumed reference docs — formatting conventions
# intentionally diverge from typical prose markdown.
config:
  # Start with everything off, then enable what matters.
  default: false

  # --- Enabled: catch real bugs ---
  # Heading levels should only increment by one (skipping levels is confusing).
  MD001: true
  # No duplicate headings (within siblings).
  MD024:
    siblings_only: true
  # No trailing spaces (except deliberate line breaks).
  MD009: true
  # No hard tabs.
  MD010: true
  # No reversed link syntax [](url) vs (url)[text].
  MD011: true
  # No multiple consecutive blank lines.
  MD012: true
  # No space inside emphasis markers.
  MD037: true
  # No space inside link text.
  MD039: true
  # Link fragments should be valid.
  MD051: true

globs:
  - "**/*.md"

ignores:
  - "node_modules/**"
  - ".git/**"
  - "**/CHANGELOG.md"
  - "**/evals/**"
